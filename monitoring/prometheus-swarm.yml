# Swarm scrape config — nginx service is the ingress to app replicas
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: product-platform
    metrics_path: /metrics
    dns_sd_configs:
      - names:
          - tasks.nginx
        type: A
        port: 80
    relabel_configs:
      - source_labels: [__meta_dns_name]
        target_label: swarm_service

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
