# Local docker-compose scrape config
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: product-platform
    metrics_path: /metrics
    static_configs:
      - targets:
          - nginx:80
        labels:
          env: local
          service: product-platform

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
