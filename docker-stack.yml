# Docker Swarm stack — deploy with:
#   docker swarm init
#   docker stack deploy -c docker-stack.yml product
#
# Scale:
#   docker service scale product_app=5
#   docker service scale product_worker=3
#
# Rolling update is configured on app service (parallelism + delay + rollback).

version: "3.8"

services:
  app:
    image: ${PRODUCT_IMAGE:-product-platform:latest}
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET:-change_me_product_swarm_secret_key_32}
      APP_INSTANCE: "{{.Task.Slot}}"
      DB_HOST: mysql
      DB_DATABASE: product_db
      DB_USER: product
      DB_PASSWORD: ${DB_PASSWORD:-product}
      DATABASE_URL: mysql://product:${DB_PASSWORD:-product}@mysql:3306/product_db?serverVersion=8.0
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-product_jwt_passphrase}
    networks:
      - frontend
      - backend
    deploy:
      mode: replicated
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1',9000)?0:1);"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  worker:
    image: ${PRODUCT_IMAGE:-product-platform:latest}
    command: ["php", "/var/www/html/bin/console", "app:worker:orders", "--env=prod"]
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET:-change_me_product_swarm_secret_key_32}
      APP_INSTANCE: worker-{{.Task.Slot}}
      DB_HOST: mysql
      DB_DATABASE: product_db
      DB_USER: product
      DB_PASSWORD: ${DB_PASSWORD:-product}
      DATABASE_URL: mysql://product:${DB_PASSWORD:-product}@mysql:3306/product_db?serverVersion=8.0
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-product_jwt_passphrase}
    networks:
      - backend
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  nginx:
    image: nginx:alpine
    ports:
      - target: 80
        published: 8141
        protocol: tcp
        mode: ingress
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    volumes:
      # Shared read-only code; in real prod bake public/ into a custom nginx image
      - app_code:/var/www/html:ro
    networks:
      - frontend
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
      placement:
        preferences:
          - spread: node.id
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: product_db
      MYSQL_USER: product
      MYSQL_PASSWORD: ${DB_PASSWORD:-product}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "15675:15672"
    networks:
      - backend
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M

  prometheus:
    image: prom/prometheus:v2.54.1
    configs:
      - source: prometheus_yml
        target: /etc/prometheus/prometheus.yml
      - source: alerts_yml
        target: /etc/prometheus/alerts.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - frontend
      - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - frontend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  frontend:
    driver: overlay
    attachable: true
  backend:
    driver: overlay
    attachable: true
    internal: true

volumes:
  mysql_data:
  redis_data:
  grafana_data:
  app_code:

configs:
  nginx_conf:
    file: ./docker/nginx-swarm.conf
  prometheus_yml:
    file: ./monitoring/prometheus-swarm.yml
  alerts_yml:
    file: ./monitoring/alerts.yml
