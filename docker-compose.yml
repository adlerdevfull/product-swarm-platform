# Local development (docker compose)
# For production-like multi-node: use docker-stack.yml with Swarm

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: base
    volumes:
      - .:/var/www/html
    environment: &app-env
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_SECRET: change_me_product_swarm_secret_key_32
      APP_INSTANCE: app-local
      DB_HOST: mysql
      DB_DATABASE: product_db
      DB_USER: product
      DB_PASSWORD: product
      DATABASE_URL: mysql://product:product@mysql:3306/product_db?serverVersion=8.0
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_PASSPHRASE: product_jwt_passphrase
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [product]

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: base
    command: ["php", "/var/www/html/bin/console", "app:worker:orders", "--env=dev"]
    volumes:
      - .:/var/www/html
    environment:
      <<: *app-env
      APP_INSTANCE: worker-local
    depends_on:
      app:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks: [product]

  nginx:
    image: nginx:alpine
    ports:
      - "8141:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [product]

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3009:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    networks: [product]

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product_db
      MYSQL_USER: product
      MYSQL_PASSWORD: product
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "product", "-pproduct"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [product]

  redis:
    image: redis:7-alpine
    ports:
      - "6383:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    networks: [product]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5674:5672"
      - "15675:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks: [product]

  # Observability (same stack as Swarm for local learning)
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks: [product]

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]
    networks: [product]

volumes:
  mysql_data:
  grafana_data:

networks:
  product:
    driver: bridge
