doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
    orm:
        auto_generate_proxy_classes: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: false
        mappings:
            Infrastructure:
                type: attribute
                dir: '%kernel.project_dir%/src/Infrastructure/Persistence/Models'
                prefix: 'Infrastructure\Persistence\Models'
                alias: InfrastructureModels
                is_bundle: false

doctrine_migrations:
    migrations_paths:
        'DoctrineMigrations': '%kernel.project_dir%/database/migrations'
    enable_profiler: false
